version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────
  # PRIMARY PostgreSQL — accepts all reads AND writes
  # ─────────────────────────────────────────────────────────────
  postgres-primary:
    image: bitnami/postgresql:15
    environment:
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: repl_password_1234
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: "1234"
      POSTGRESQL_DATABASE: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_primary_data:/bitnami/postgresql
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─────────────────────────────────────────────────────────────
  # REPLICA PostgreSQL — streaming replication from primary
  # Accepts read-only queries; writes are blocked by PostgreSQL
  # ─────────────────────────────────────────────────────────────
  postgres-replica:
    image: bitnami/postgresql:15
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: repl_password_1234
      POSTGRESQL_MASTER_HOST: postgres-primary
      POSTGRESQL_MASTER_PORT_NUMBER: 5432
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: "1234"
    ports:
      - "5433:5432"
    depends_on:
      postgres-primary:
        condition: service_healthy
    volumes:
      - postgres_replica_data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────────────────────
  # AUTH SERVICE
  # ─────────────────────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    ports:
      - "5001:5001"
    restart: on-failure
    environment:
      DB_PRIMARY_HOST: postgres-primary
      DB_PRIMARY_PORT: 5432
      DB_REPLICA_HOST: postgres-replica
      DB_REPLICA_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: "1234"
      DB_NAME: auth_db
      JWT_SECRET: your-super-secret-jwt-key
      COURSE_SERVICE_URL: http://course-service:5002
      LEARNING_SERVICE_URL: http://learning-service:5003
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────
  # COURSE SERVICE
  # ─────────────────────────────────────────────────────────────
  course-service:
    build: ./course-service
    ports:
      - "5002:5002"
    restart: on-failure
    environment:
      DB_PRIMARY_HOST: postgres-primary
      DB_PRIMARY_PORT: 5432
      DB_REPLICA_HOST: postgres-replica
      DB_REPLICA_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: "1234"
      DB_NAME: course_db
      AUTH_SERVICE_URL: http://auth-service:5001
      LEARNING_SERVICE_URL: http://learning-service:5003
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
      auth-service:
        condition: service_started

  # ─────────────────────────────────────────────────────────────
  # LEARNING SERVICE
  # ─────────────────────────────────────────────────────────────
  learning-service:
    build: ./learning-service
    ports:
      - "5003:5003"
    restart: on-failure
    environment:
      DB_PRIMARY_HOST: postgres-primary
      DB_PRIMARY_PORT: 5432
      DB_REPLICA_HOST: postgres-replica
      DB_REPLICA_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: "1234"
      DB_NAME: learning_db
      AUTH_SERVICE_URL: http://auth-service:5001
      COURSE_SERVICE_URL: http://course-service:5002
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
      auth-service:
        condition: service_started
      course-service:
        condition: service_started

  # ─────────────────────────────────────────────────────────────
  # FRONTEND
  # ─────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_AUTH_API_URL: http://auth-service:5001/auth
      REACT_APP_COURSE_API_URL: http://course-service:5002/api
      REACT_APP_LEARNING_API_URL: http://learning-service:5003/api
    depends_on:
      auth-service:
        condition: service_started
      course-service:
        condition: service_started
      learning-service:
        condition: service_started

volumes:
  postgres_primary_data:
  postgres_replica_data:
